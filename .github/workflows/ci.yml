name: ci

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      signed_smoke:
        description: "Run signed AO2 control-plane smoke on a prepared runner with sibling AO repos"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      runner:
        description: "Runner label for the prepared AO workspace"
        required: true
        default: "ubuntu-latest"

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Go tests
        run: go test ./...
      - name: JSON fixtures
        shell: bash
        run: jq empty docs/contracts/*.json examples/**/*.json docs/evidence/pulse/**/*.json
      - name: Public safety scan
        shell: bash
        run: |
          pattern="ghp""_|github""_pat_|BEGIN ""RSA|BEGIN ""OPENSSH|ANTI""GRAVITY|private ""handoff"
          ! rg -n "$pattern" README.md docs examples internal cmd
      - name: Release dry-run
        run: go run ./cmd/foundry release dry-run --out tmp/release-manifest.json
      - name: Release manifest schema validation
        run: go run ./cmd/foundry release validate-manifest --manifest tmp/release-manifest.json
      - name: Release candidate ledger validation
        run: go run ./cmd/foundry release candidate validate --ledger examples/readiness/active-spine-release-candidate.ledger.json
      - name: Release candidate active-stack parity
        run: go run ./cmd/foundry release candidate active-stack-parity --ledger examples/readiness/active-spine-release-candidate.ledger.json --readiness-ledger examples/readiness/active-stack-readiness.ledger.json
      - name: Release promotion fixture validation
        run: go run ./cmd/foundry release promotion validate --candidate examples/readiness/active-spine-release-candidate.ledger.json --signed-smoke-summary examples/contract-fixtures/valid/foundry-signed-smoke-summary-v0.1.json --out tmp/release-promotion.fixture.json
      - name: Release handoff validation
        run: go run ./cmd/foundry release handoff --candidate examples/readiness/active-spine-release-candidate.ledger.json --signed-smoke-summary examples/contract-fixtures/valid/foundry-signed-smoke-summary-v0.1.json --promotion-out tmp/release-promotion.handoff.json --notes-out tmp/release-candidate.handoff.md --manifest-out tmp/release-manifest.handoff.json
      - name: Contract fixture schema validation
        run: go run ./cmd/foundry contract fixtures validate
      - name: Readiness snapshot parity
        shell: bash
        run: |
          mkdir -p tmp
          go run ./cmd/foundry readiness snapshot --ledger examples/readiness/active-stack-readiness.ledger.json > tmp/readiness-snapshot.md
          sed -n '/<!-- foundry:active-stack-readiness:start -->/,/<!-- foundry:active-stack-readiness:end -->/p' README.md > tmp/readme-readiness-snapshot.md
          diff -u tmp/readme-readiness-snapshot.md tmp/readiness-snapshot.md
      - name: Freshness regression tests
        shell: bash
        run: go test ./internal/cli -run 'TestPulseRunBlocksStaleForgeLivePacket|TestPulseRunBlocksStaleControlPlaneReadback|TestPulseRunBlocksControlPlaneReadbackDigestMismatch' -v
      - name: Signed-smoke freshness fixture
        shell: bash
        run: go test ./internal/cli -run TestSignedSmokeFreshnessCIFixtureValidates -v
      - name: Stale control-plane freshness fixture
        shell: bash
        run: go test ./internal/cli -run TestStaleControlPlaneReadbackCIFixtureValidates -v
      - name: Stale freshness decision fixture
        shell: bash
        run: go test ./internal/cli -run TestStaleFreshnessDerivedDecisionCIFixtureValidates -v
      - name: Stale control-plane decision fixture
        shell: bash
        run: go test ./internal/cli -run TestStaleControlPlaneDerivedDecisionCIFixtureValidates -v
      - name: Pulse smoke
        shell: bash
        run: |
          go run ./cmd/foundry pulse run --out tmp/pulse-smoke
          go run ./cmd/foundry pulse summarize-signed-smoke --pulse tmp/pulse-smoke/pulse-event.json --out tmp/pulse-smoke/signed-smoke-summary.json
          go run ./cmd/foundry trace inspect --trace tmp/pulse-smoke/pulse.trace.jsonl

  signed-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_smoke == 'true' }}
    runs-on: ${{ inputs.runner }}
    env:
      AO2_CP_API_TOKEN: ${{ secrets.AO2_CP_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare sibling AO workspace
        shell: bash
        run: |
          if [ ! -d ../ao-forge ]; then
            git clone --depth 1 https://github.com/uesugitorachiyo/ao-forge.git ../ao-forge
          fi
          if [ ! -d ../ao-covenant ]; then
            git clone --depth 1 https://github.com/uesugitorachiyo/ao-covenant.git ../ao-covenant
          fi
          if [ ! -d ../ao2 ]; then
            git clone --depth 1 https://github.com/uesugitorachiyo/ao2.git ../ao2
          fi
          if [ ! -d ../ao2-control-plane ]; then
            git clone --depth 1 https://github.com/uesugitorachiyo/ao2-control-plane.git ../ao2-control-plane
          fi
          (cd ../ao2 && cargo build -p ao2-cli)
          (cd ../ao2-control-plane && cargo build -p ao2-cp-server)
      - name: Verify signed-smoke workspace
        shell: bash
        run: |
          test -d ../ao-forge
          test -d ../ao-covenant
          test -x ../ao2/target/debug/ao2
          test -x ../ao2-control-plane/target/debug/ao2-cp-server
      - name: Generate signed smoke script
        shell: bash
        run: go run ./cmd/foundry pulse signed-smoke-script --out tmp/signed-smoke.sh
      - name: Run signed smoke
        shell: bash
        run: bash tmp/signed-smoke.sh
      - name: Scan signed-smoke release evidence
        shell: bash
        run: |
          pattern="ghp""_|github""_pat_|BEGIN ""RSA|BEGIN ""OPENSSH|AO2_CP_API_TOKEN|local-signed-smoke-token|api""_key|access""_token"
          ! rg -n "$pattern" tmp/pulse-live/signed-smoke-summary.json tmp/release-promotion.live.json
      - name: Upload signed-smoke release evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: signed-smoke-release-evidence
          path: |
            tmp/pulse-live/signed-smoke-summary.json
            tmp/release-promotion.live.json
          retention-days: 7
